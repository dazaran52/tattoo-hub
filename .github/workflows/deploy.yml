name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/tattoo-hub/backend || cd /home/ubuntu/tattoo-hub/backend || cd /home/dazaran/tattoo-hub/backend
            chmod +x deploy.sh
            ./deploy.sh
